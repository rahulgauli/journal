name: Deploy

on:
  # workflow_run:
  #   workflows: ["CI"]
  #   branches: [main]
  #   types: [completed]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    name: Build image & deploy to production
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -T 10 -t rsa,ecdsa,ed25519 -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Copy docker-compose to server
        run: ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} 'cat > ~/docker-compose.yml' < docker-compose.yml

      - name: Deploy on server
        env:
          GITHUB_REPO: ${{ github.repository }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          GOOGLE_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            GITHUB_REPO="$GITHUB_REPO" \
            AUTH_SECRET="$AUTH_SECRET" \
            APP_URL="$APP_URL" \
            GOOGLE_ID="$GOOGLE_ID" \
            GOOGLE_SECRET="$GOOGLE_SECRET" \
            GH_TOKEN="$GH_TOKEN" \
            GH_ACTOR="$GH_ACTOR" \
            'bash -s' << 'EOF'
            printf 'GITHUB_REPOSITORY=%s\nBETTER_AUTH_SECRET=%s\nBETTER_AUTH_URL=%s\nGOOGLE_CLIENT_ID=%s\nGOOGLE_CLIENT_SECRET=%s\nNEXT_PUBLIC_APP_URL=%s\n' \
              "$GITHUB_REPO" "$AUTH_SECRET" "$APP_URL" "$GOOGLE_ID" "$GOOGLE_SECRET" "$APP_URL" > ~/.env
            chmod 600 ~/.env
            echo "$GH_TOKEN" | sudo docker login ghcr.io -u "$GH_ACTOR" --password-stdin
            # Backup DB before deploying new image
            if sudo docker inspect journal > /dev/null 2>&1; then
              sudo docker exec journal sqlite3 /app/db/journal.db ".backup '/tmp/journal-backup.db'" 2>/dev/null || true
              cp /tmp/journal-backup.db ~/journal-backup-$(date +%Y%m%d-%H%M%S).db 2>/dev/null || true
              ls -t ~/journal-backup-*.db 2>/dev/null | tail -n +6 | xargs rm -f || true
            fi
            sudo docker compose --env-file ~/.env -f ~/docker-compose.yml pull
            sudo docker compose --env-file ~/.env -f ~/docker-compose.yml up -d
            sudo docker image prune -af
          EOF

      - name: Notify success
        if: success() && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {"text": "✅ journal deployed to production — <https://github.com/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {"text": "❌ journal deploy FAILED — <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|view run>"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
